<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="CATTI PRO"/>
<title>CATTI 备考专业系统 · PRO版</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#020810;--s1:#070e1c;--card:#0c1525;--card2:#101d2e;
  --b1:#182033;--b2:#1e2d45;
  --cyan:#00e5ff;--cyan2:#00b4cc;--indigo:#818cf8;--green:#34d399;
  --red:#fb7185;--yellow:#fbbf24;--orange:#fb923c;--purple:#c084fc;
  --text:#dceeff;--muted:#3d5a7a;--muted2:#5a7a9a;
  --mono:'Space Mono',monospace;--body:'Noto Sans SC',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);}
button{font-family:var(--body);cursor:pointer;}
input,textarea,select{font-family:var(--body);}
textarea{resize:none;}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
body::before{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,.008) 3px,rgba(0,229,255,.008) 4px);
  pointer-events:none;z-index:9998;}
/* GLOW BG */
body::after{content:'';position:fixed;top:-30%;left:-20%;width:60%;height:60%;
  background:radial-gradient(ellipse,rgba(0,60,100,.25),transparent 70%);
  pointer-events:none;z-index:0;}

/* ─── AUTH ─────────────────────────────── */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 90% 90% at 50% -10%,#00182e,#020810 65%);
  padding:20px;z-index:500;}
.abox{width:100%;max-width:400px;position:relative;z-index:1;}
.alogo{text-align:center;margin-bottom:30px;}
.alogo-main{font-family:var(--mono);font-size:30px;font-weight:700;letter-spacing:6px;
  color:var(--cyan);text-shadow:0 0 40px rgba(0,229,255,.5),0 0 80px rgba(0,229,255,.2);}
.alogo-sub{font-size:11px;color:var(--muted2);letter-spacing:3px;margin-top:6px;font-family:var(--mono);}
.alogo-ver{display:inline-block;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.2);
  color:var(--cyan);font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:10px;margin-top:8px;}
.acard{background:rgba(12,21,37,.97);border:1px solid var(--b2);border-radius:16px;
  padding:24px;backdrop-filter:blur(30px);
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(0,229,255,.05);}
.atabs{display:flex;border:1px solid var(--b1);border-radius:8px;overflow:hidden;margin-bottom:20px;}
.atab{flex:1;padding:9px;border:none;background:transparent;color:var(--muted2);
  font-size:12px;font-family:var(--mono);transition:.2s;}
.atab.on{background:rgba(0,229,255,.1);color:var(--cyan);}
.f{margin-bottom:14px;}
.f label{display:block;font-size:10px;color:var(--muted2);letter-spacing:1.5px;
  margin-bottom:5px;font-family:var(--mono);}
.inp{background:#040c18;border:1px solid var(--b1);color:var(--text);
  padding:10px 13px;border-radius:8px;font-size:13px;outline:none;width:100%;transition:.2s;}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.06);}
.abtn{width:100%;padding:12px;border-radius:8px;
  border:1px solid rgba(0,229,255,.25);
  background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(129,140,248,.1));
  color:var(--cyan);font-size:13px;font-weight:700;letter-spacing:2px;
  font-family:var(--mono);transition:.2s;margin-top:2px;}
.abtn:hover{background:linear-gradient(135deg,rgba(0,229,255,.18),rgba(129,140,248,.18));}
.amsg{text-align:center;font-size:11px;margin-top:9px;min-height:14px;font-family:var(--mono);}

/* ─── APP ─────────────────────────────── */
#app{display:none;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;position:relative;z-index:1;}
#app.show{display:flex;}

/* Top bar */
.tb{background:rgba(7,14,28,.98);border-bottom:1px solid var(--b1);
  padding:10px 14px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(30px);}
.tb1{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.tlogo{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:3px;color:var(--cyan);}
.tright{display:flex;align-items:center;gap:8px;}
.net{display:flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);}
.ndot{width:5px;height:5px;border-radius:50%;}
.ndot.on{background:var(--green);box-shadow:0 0 5px var(--green);}
.ndot.off{background:var(--red);}
.av{width:27px;height:27px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--indigo));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#000;font-family:var(--mono);}
.un{font-size:10px;color:var(--muted2);font-family:var(--mono);}
.syn{font-size:9px;color:var(--muted);font-family:var(--mono);}
.dot2{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:3px;vertical-align:middle;}
.dok{background:var(--green);}
.dsav{background:var(--yellow);animation:pulse 1s infinite;}
@keyframes pulse{50%{opacity:.2}}
.lbtn{background:transparent;border:1px solid var(--b1);color:var(--muted);
  padding:3px 8px;border-radius:5px;font-size:10px;font-family:var(--mono);}
.tb2{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.lvsw{display:flex;gap:5px;}
.lv{padding:4px 12px;border-radius:18px;border:1px solid var(--b1);
  background:transparent;color:var(--muted);font-size:11px;font-weight:700;
  font-family:var(--mono);transition:.15s;}
.lv.a2{border-color:var(--cyan);background:rgba(0,229,255,.08);color:var(--cyan);}
.lv.a3{border-color:var(--green);background:rgba(52,211,153,.08);color:var(--green);}
.ei{font-size:10px;color:var(--muted);font-family:var(--mono);}

/* Nav tabs - two rows: main + sub */
.nav{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--b1);}
.nav::-webkit-scrollbar{display:none;}
.nt{padding:8px 12px;border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;
  background:transparent;color:var(--muted);font-size:11px;font-family:var(--mono);
  white-space:nowrap;transition:.15s;letter-spacing:.3px;}
.nt.on{color:var(--cyan);border-bottom-color:var(--cyan);}
.nt.kb{color:var(--indigo);}
.nt.kb.on{color:var(--indigo);border-bottom-color:var(--indigo);}
.nt.pn{color:var(--yellow);}
.nt.pn.on{color:var(--yellow);border-bottom-color:var(--yellow);}

/* Content */
.main{flex:1;overflow-y:auto;padding:14px;padding-bottom:50px;}

/* ─── CARDS ────────────── */
.card{background:var(--card);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:12px;}
.ct{font-size:11px;font-weight:700;margin-bottom:12px;letter-spacing:1px;font-family:var(--mono);}
.mu{color:var(--muted);font-size:11px;font-family:var(--mono);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.lb{display:block;font-size:10px;color:var(--muted2);margin-bottom:4px;font-family:var(--mono);letter-spacing:.5px;}
.ai{background:#040c18;border:1px solid var(--b1);color:var(--text);
  padding:8px 11px;border-radius:7px;font-size:13px;outline:none;width:100%;transition:.2s;}
.ai:focus{border-color:var(--cyan);}
.ta{height:72px;}

/* Buttons */
.btn{width:100%;padding:10px;border-radius:7px;border:none;
  font-size:11px;font-weight:700;letter-spacing:1px;transition:.15s;font-family:var(--mono);}
.bc{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);color:var(--cyan);}
.br{background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.2);color:var(--red);}
.bi{background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.2);color:var(--indigo);}
.bg{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);color:var(--green);}
.by{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--yellow);}
.bp{background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.2);color:var(--purple);}
.sm{padding:3px 8px;border-radius:9px;border:1px solid var(--b1);background:transparent;color:var(--muted);font-size:10px;font-family:var(--mono);}
.sm.ok{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.07);}
.sm.dl{border-color:rgba(251,113,133,.2);color:var(--red);}

/* Score */
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:11px;}
.sc{background:#040c18;border-radius:9px;padding:11px;text-align:center;border:1px solid var(--b1);}
.sn{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1;}
.sl{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono);letter-spacing:.5px;}
.ss{font-size:10px;color:var(--muted2);margin-top:2px;}
.pb{background:#070e1c;border-radius:3px;height:4px;overflow:hidden;margin-top:4px;}
.pf{height:100%;border-radius:3px;transition:width 1s ease;}
.pr{display:flex;justify-content:space-between;align-items:center;font-size:10px;}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;font-family:var(--mono);white-space:nowrap;}
.t-8{background:rgba(0,229,255,.08);color:var(--cyan);border:1px solid rgba(0,229,255,.15);}
.t-k{background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.15);}
.t-3b{background:rgba(129,140,248,.08);color:var(--indigo);border:1px solid rgba(129,140,248,.15);}
.t-2b{background:rgba(251,191,36,.08);color:var(--yellow);border:1px solid rgba(251,191,36,.15);}
.t-1b{background:rgba(251,113,133,.08);color:var(--red);border:1px solid rgba(251,113,133,.15);}
.t-3k{background:rgba(192,132,252,.08);color:var(--purple);border:1px solid rgba(192,132,252,.15);}
.t-2k{background:rgba(251,146,60,.08);color:var(--orange);border:1px solid rgba(251,146,60,.15);}
.t-1k{background:rgba(20,184,166,.08);color:#2dd4bf;border:1px solid rgba(20,184,166,.15);}
.tcat{background:rgba(30,45,69,.6);color:var(--muted2);border:1px solid var(--b1);font-size:10px;padding:2px 7px;border-radius:8px;font-family:var(--mono);}

/* Chips filter */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
.chip{padding:4px 11px;border-radius:18px;border:1px solid var(--b1);
  background:transparent;color:var(--muted);font-size:11px;font-family:var(--mono);transition:.12s;}
.chip.on{border-color:var(--cyan);background:rgba(0,229,255,.07);color:var(--cyan);}

/* ─── VOCAB CARD ──────── */
.vclist{display:flex;flex-direction:column;gap:9px;}
.vc{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:13px;
  border-left:3px solid var(--b2);transition:.2s;}
.vc:hover{border-color:var(--b2);border-left-color:var(--cyan);}
.vc.mastered{border-left-color:var(--green);opacity:.65;}
.vc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px;}
.vc-en{font-size:15px;font-weight:700;color:var(--text);}
.vc-cn{font-size:13px;color:var(--cyan);margin:4px 0;}
.vc-mem{font-size:12px;color:var(--muted2);line-height:1.6;margin-top:5px;
  padding:7px 9px;background:#040c18;border-radius:6px;}
.vc-btns{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}

/* Flashcard */
.flash-wrap{perspective:1000px;cursor:pointer;margin-bottom:14px;}
.flash-inner{position:relative;width:100%;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);}
.flash-inner.flipped{transform:rotateY(180deg);}
.flash-f,.flash-b{width:100%;backface-visibility:hidden;background:var(--card);
  border:1px solid var(--b1);border-radius:14px;padding:28px 20px;text-align:center;
  min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.flash-b{position:absolute;top:0;left:0;transform:rotateY(180deg);
  border-color:rgba(0,229,255,.2);background:rgba(0,45,70,.3);}
.flash-hint{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:12px;}
.flash-q{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;}
.flash-sub{font-size:13px;color:var(--muted2);}
.flash-a{font-size:20px;font-weight:700;color:var(--cyan);}
.flash-mem{font-size:12px;color:var(--muted2);margin-top:10px;line-height:1.6;}
.flash-nav{display:flex;gap:8px;margin-bottom:14px;}
.flash-prog{text-align:center;font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:10px;}

/* ─── COLLOCATION CARD ── */
.col-card{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:13px;margin-bottom:9px;}
.col-en{font-size:16px;font-weight:700;color:var(--cyan);font-family:var(--mono);}
.col-cn{font-size:13px;color:var(--text);margin:5px 0;}
.col-ex{background:#040c18;border-radius:7px;padding:10px;margin-top:8px;}
.col-ex-en{font-size:13px;line-height:1.7;color:var(--text);}
.col-ex-cn{font-size:12px;color:var(--muted2);margin-top:4px;}
.col-note{font-size:11px;color:var(--indigo);margin-top:7px;font-style:italic;}

/* ─── TECHNIQUE CARD ──── */
.tech-card{background:var(--card);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-bottom:9px;}
.tech-name{font-size:15px;font-weight:700;color:var(--yellow);}
.tech-en{font-size:11px;color:var(--muted2);font-family:var(--mono);margin-bottom:6px;}
.tech-desc{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:10px;}
.tech-ex{background:#040c18;border-radius:8px;padding:12px;}
.t-src{font-size:12px;color:var(--muted);margin-bottom:6px;font-family:var(--mono);}
.t-cn{font-size:13px;color:var(--text);margin-bottom:10px;padding:6px 0;border-bottom:1px solid var(--b1);}
.t-best{background:rgba(52,211,153,.06);border-radius:6px;padding:9px;margin-bottom:6px;}
.t-best-lbl{font-size:10px;color:var(--green);font-family:var(--mono);margin-bottom:4px;}
.t-best-txt{font-size:13px;color:var(--text);line-height:1.7;}
.t-alt{background:rgba(129,140,248,.05);border-radius:6px;padding:9px;margin-bottom:6px;}
.t-alt-lbl{font-size:10px;color:var(--indigo);font-family:var(--mono);margin-bottom:4px;}
.t-alt-txt{font-size:13px;color:var(--text);line-height:1.7;}
.t-note{font-size:11px;color:var(--muted2);margin-top:8px;padding-top:8px;border-top:1px solid var(--b1);line-height:1.6;}

/* ─── PROPER NOUNS ──────── */
.pn-card{display:flex;justify-content:space-between;align-items:flex-start;
  background:var(--card);border:1px solid var(--b1);border-radius:10px;
  padding:12px;margin-bottom:7px;gap:10px;}
.pn-cn{font-size:13px;font-weight:700;color:var(--text);flex:1;}
.pn-en{font-size:12px;color:var(--cyan);font-family:var(--mono);margin-top:3px;}
.pn-cat-lbl{font-size:10px;color:var(--muted2);white-space:nowrap;font-family:var(--mono);}

/* ─── QUIZ ────────────── */
.qcard{background:#040c18;border-radius:10px;padding:14px;border:1px solid var(--b1);}
.qtxt{font-size:14px;line-height:1.8;margin-bottom:13px;white-space:pre-line;}
.qopts{display:flex;flex-direction:column;gap:6px;}
.qo{padding:9px 13px;border-radius:7px;border:1px solid var(--b1);
  background:transparent;color:var(--text);text-align:left;font-size:13px;transition:.15s;}
.qo:hover:not([disabled]){border-color:var(--cyan);background:rgba(0,229,255,.04);}
.qo.ok{border-color:var(--green)!important;background:rgba(52,211,153,.1);color:var(--green);}
.qo.ng{border-color:var(--red)!important;background:rgba(251,113,133,.1);color:var(--red);}

.qo.sel{border-color:var(--yellow)!important;background:rgba(245,158,11,.08);}
.qexp{margin-top:12px;background:#070e1c;border-radius:9px;padding:14px;border:1px solid var(--b1);}
.qexp-title{font-size:10px;font-family:var(--mono);color:var(--yellow);margin-bottom:8px;letter-spacing:1px;}
.qexp-sect{margin-bottom:10px;}
.qexp-sh{font-size:10px;font-family:var(--mono);color:var(--muted2);margin-bottom:4px;letter-spacing:.5px;}
.qexp-txt{font-size:12px;line-height:1.8;color:var(--text);}
.best-ans{background:rgba(52,211,153,.06);border-radius:6px;padding:9px;margin:6px 0;}
.alt-ans{background:rgba(129,140,248,.05);border-radius:6px;padding:9px;margin:6px 0;}

/* ─── ERROR NOTE ───────── */
.en-card{background:var(--card);border:1px solid var(--b1);border-radius:11px;
  padding:13px;margin-bottom:10px;border-left:3px solid var(--red);}
.en-card.done{border-left-color:var(--green);opacity:.65;}
.en-hdr{display:flex;justify-content:space-between;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.etag{font-size:10px;padding:2px 9px;border-radius:9px;
  background:rgba(0,229,255,.07);color:var(--cyan);border:1px solid rgba(0,229,255,.12);font-family:var(--mono);}
.ecols{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.ecol{background:#040c18;border-radius:7px;padding:9px;}
.eclbl{font-size:10px;font-family:var(--mono);margin-bottom:4px;letter-spacing:.5px;}
.ectxt{font-size:13px;line-height:1.6;}
.nbox{background:#040c18;border-radius:7px;padding:13px;margin-top:9px;
  border:1px solid rgba(129,140,248,.1);}
.npre{font-size:12px;line-height:2;white-space:pre-wrap;color:var(--text);}

/* ─── STATS ───────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.stat-cell{background:#040c18;border-radius:10px;padding:13px;text-align:center;border:1px solid var(--b1);}
.stat-num{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:5px;font-family:var(--mono);}

/* Review / Guide */
.rb{background:#040c18;border-radius:9px;padding:13px;margin-bottom:9px;border:1px solid var(--b1);}
.rt{font-size:10px;font-weight:700;margin-bottom:7px;font-family:var(--mono);letter-spacing:1px;}
.rr{font-size:13px;line-height:2;}
.gs{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:13px;margin-bottom:10px;}
.gi{font-size:13px;padding:6px 0;border-bottom:1px solid rgba(24,32,51,.6);line-height:1.7;}
.gi:last-child{border-bottom:none;}

/* DL bar */
.dlbar{background:rgba(0,229,255,.03);border:1px solid rgba(0,229,255,.1);border-radius:9px;
  padding:10px 13px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:9px;}
.dlbtn{padding:5px 12px;border-radius:6px;border:1px solid rgba(0,229,255,.2);
  background:rgba(0,229,255,.08);color:var(--cyan);font-size:10px;font-weight:700;font-family:var(--mono);}

/* Mode switch */
.mode-sw{display:flex;border:1px solid var(--b1);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.ms-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);
  font-size:11px;font-family:var(--mono);transition:.2s;}
.ms-btn.on{background:rgba(0,229,255,.09);color:var(--cyan);}

/* Charts */
.csc{overflow-x:auto;-webkit-overflow-scrolling:touch;}

@media(max-width:480px){
  .ecols{grid-template-columns:1fr;}
  .g3{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="abox">
    <div class="alogo">
      <div class="alogo-main">CATTI</div>
      <div class="alogo-sub">PRO TRANSLATION SYSTEM</div>
      <div><span class="alogo-ver">v3.0 · 二级 & 三级 · 完整版</span></div>
    </div>
    <div class="acard">
      <div class="atabs">
        <button class="atab on" id="at1" onclick="showATab('login')">登 录</button>
        <button class="atab" id="at2" onclick="showATab('reg')">注 册</button>
      </div>
      <div id="pl">
        <div class="f"><label>账号</label><input class="inp" id="lu" placeholder="用户名" autocomplete="username"/></div>
        <div class="f"><label>密码</label><input class="inp" type="password" id="lp" placeholder="密码" autocomplete="current-password"/></div>

        <div class="amsg" id="lm"></div>
      </div>

        <div class="f"><label>设置密码</label><input class="inp" type="password" id="rp" placeholder="至少6位" autocomplete="new-password"/></div>
        <div class="f"><label>确认密码</label><input class="inp" type="password" id="rp2" placeholder="再次输入" autocomplete="new-password"/></div>

        <div class="amsg" id="rm"></div>

        </div>
      </div>
    </div>
  </div>
</div>

function allU(){try{return JSON.parse(localStorage.getItem(AK+'_u')||'{}')}catch{return{}}}

function getUD(){const u=allU();return u[CU]?.data||{r2:[],e2:[],r3:[],e3:[],vm:{},qstat:{correct:0,total:0},pnstat:{}}}
function setUD(d){const u=allU();if(!u[CU])return;u[CU].data=d;saveU(u)}
function getRec(){return getUD()[`r${CLV}`]||[]}
function getErr(){return getUD()[`e${CLV}`]||[]}
function saveRec(r){const d=getUD();d[`r${CLV}`]=r;setUD(d);sync('ok')}
function saveErr(e){const d=getUD();d[`e${CLV}`]=e;setUD(d);sync('ok')}

function setQStat(s){const d=getUD();d.qstat=s;setUD(d)}
function getPNStat(){return getUD().pnstat||{}}
function setPNStat(s){const d=getUD();d.pnstat=s;setUD(d)}

function hp(p){let h=0;for(let i=0;i<p.length;i++)h=(Math.imul(31,h)+p.charCodeAt(i))|0;return h.toString(36)+'_'+p.length+'_'+btoa(p.split('').reverse().join('')).slice(0,8)}

function showATab(t){
  document.getElementById('pl').style.display=t==='login'?'block':'none';
  document.getElementById('pr2').style.display=t==='reg'?'block':'none';
  document.getElementById('at1').className='atab'+(t==='login'?' on':'');
  document.getElementById('at2').className='atab'+(t==='reg'?' on':'');
}
function doLogin(){
  const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
  const m=document.getElementById('lm');
  if(!u||!p){msg(m,'请填写账号和密码','var(--red)');return}
  const us=allU();
  if(!us[u]){msg(m,'账号不存在，请先注册','var(--red)');return}
  if(us[u].pass!==hp(p)){msg(m,'密码错误','var(--red)');return}
  msg(m,'登录成功 ✓','var(--green)');
  setTimeout(()=>enterApp(u),500);
}
function doReg(){
  const u=document.getElementById('ru').value.trim(),p=document.getElementById('rp').value,p2=document.getElementById('rp2').value;
  const m=document.getElementById('rm');
  if(!u){msg(m,'请填写用户名','var(--red)');return}
  if(!/^[a-zA-Z0-9_\u4e00-\u9fa5]{2,20}$/.test(u)){msg(m,'用户名2-20位','var(--red)');return}
  if(p.length<6){msg(m,'密码至少6位','var(--red)');return}
  if(p!==p2){msg(m,'两次密码不一致','var(--red)');return}
  const us=allU();
  if(us[u]){msg(m,'该用户名已存在','var(--red)');return}
  us[u]={pass:hp(p),at:Date.now(),data:{r2:[],e2:[],r3:[],e3:[],vm:{},qstat:{correct:0,total:0,byType:{}},pnstat:{}}};
  saveU(us);msg(m,'注册成功，正在进入...','var(--green)');
  setTimeout(()=>enterApp(u),600);
}
function logout(){
  try{sessionStorage.removeItem(AK+'_s')}catch{}
  CU=null;
  document.getElementById('app').className='';
  document.getElementById('auth').style.display='flex';
  ['lu','lp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('lm').textContent='';
}
function enterApp(u){
  CU=u;
  try{sessionStorage.setItem(AK+'_s',JSON.stringify({u}))}catch{}
  document.getElementById('auth').style.display='none';
  document.getElementById('app').className='show';
  document.getElementById('un').textContent=u;
  document.getElementById('uav').textContent=u.charAt(0).toUpperCase();
  switchLv(2);sync('ok');
}
function msg(el,t,c){el.textContent=t;el.style.color=c}

  document.getElementById('nav').innerHTML=TABS.map(t=>{
    let lb=t.lb;
    if(t.id==='errors'&&errs.length>0) lb+=`(${errs.length})`;
    return `<button class="nt${CTAB===t.id?' on':''}${t.cls?' '+t.cls:''}" onclick="setTab('${t.id}')">${lb}</button>`;
  }).join('');
}

function td(){return new Date().toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'})}

function autoNote(cat,w,c){
  const m={
    vocab:`【词汇辨析笔记】\n❌ 错误/模糊：${w}\n✅ 正确表达：${c}\n\n📌 辨析要点\n• 注意该词在正式文体中的使用语境\n• 区分近义词的情感色彩与搭配习惯\n• 联系政府工作报告标准表达记忆\n\n🔗 相关固定搭配\n请在「固定搭配」模块搜索相关词组\n\n🔁 复习建议\n加入词卡，下次练习主动造句使用`,
    grammar:`【语法结构笔记】\n❌ 问题句型：${w}\n✅ 修正后：${c}\n\n📌 语法要点\n• 分析主谓宾，理清句子结构\n• 英重形合（靠连接词），中重意合（靠语义）\n• 长难句：先找主句主谓，再处理从句\n\n⚙️ 相关技巧\n参见「翻译技巧」→ 转换法/拆句法\n\n🔁 复习建议\n同类句型再练3遍，形成语感`,
    hanyi:`【汉译英表达笔记】\n❌ 我的译文：${w}\n✅ 参考译文：${c}\n\n📌 翻译要点\n• 避免逐字翻译，注意英文逻辑\n• 正式文体使用高级词汇\n• 注意时态语态转换\n\n⚙️ 相关技巧\n参见「翻译技巧」→ 政治文本处理 / 增译法\n\n🔁 复习建议\n背诵核心句式，下次练习直接套用`,
    yihan:`【英译汉理解笔记】\n❌ 问题/原句：${w}\n✅ 正确理解：${c}\n\n📌 翻译要点\n• 先通读全段把握大意，再逐句精译\n• 专业词汇须准确，不可望文生义\n• 检查：读给母语者听，是否自然\n\n🏛️ 相关专名\n参见「专名词典」查找相关术语\n\n🔁 复习建议\n对照双语文本反复阅读`,
    term:`【专业术语笔记】\n❌ 错误译法：${w}\n✅ 标准译法：${c}\n\n📌 术语要点\n• 政经类以新华社/官方为准\n• 建立个人术语词典，按领域分类\n\n🏛️ 扩展\n参见「专名词典」查找同类术语\n\n🔁 复习建议\n本周内使用该术语3次`,
    style:`【文体风格笔记】\n❌ 问题表达：${w}\n✅ 规范表达：${c}\n\n📌 文体要点\n• 笔译以正式书面语为主\n• 政论：措辞庄重、逻辑严密\n• 新闻：简洁客观、时态准确\n\n⚙️ 相关技巧\n参见「翻译技巧」→ 政治文本处理\n\n🔁 复习建议\n精读5篇同类型参考译文`,
  };
  return m[cat]||`【备注】\n错误：${w}\n修正：${c}`;
}

// ---- Date helpers (YYYY-MM-DD)
function ymd(d=new Date()){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const da=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function addDays(dateStr,days){
  const d=new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+days);
  return ymd(d);
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function isDue(dateStr){
  if(!dateStr) return true;
  return dateStr<=ymd();
}

(function(){
  if(!document.getElementById('imf')){

    inp.addEventListener('change',()=>{ if(inp.files&&inp.files[0]) importData(inp.files[0]); inp.value=''; });
    document.body.appendChild(inp);
  }
})();
function openImport(){ document.getElementById('imf')?.click(); }
function importData(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      const d=obj?.data;
      if(!d||typeof d!=='object') throw new Error('格式不正确');
      // 直接覆盖当前用户数据（最安全/最一致）
      setUD(d);
      sync('ok');
      alert('导入成功：已覆盖当前账号数据。');
      render();
    }catch(e){
      alert('导入失败：'+(e?.message||e));
    }
  };
  r.readAsText(file,'utf-8');
}

// ---- Plan
function getPlan(){ return getUD().plan||[]; }
function savePlan(plan){ const d=getUD(); d.plan=plan; setUD(d); sync('ok'); }
function planUpsert(item){
  const plan=getPlan();
  // same key+kind de-dup
  const key=(item.kind||'')+'|'+(item.en||item.key||'')+'|'+(item.cn||'');
  const i=plan.findIndex(p=>((p.kind||'')+'|'+(p.en||p.key||'')+'|'+(p.cn||''))===key);
  if(i>=0){
    // 若存在：把 next 提前（更紧迫）
    plan[i].next = (plan[i].next && plan[i].next<item.next) ? plan[i].next : item.next;
    plan[i].note = plan[i].note || item.note;
    plan[i].src = plan[i].src || item.src;
  }else{
    plan.unshift(item);
  }
  savePlan(plan);
}
function planFromAnalysis(q){
  const a=q?.analysis;
  if(!a) return;
  const src = q?.analysis?.src || '题库解析';
  const date = ymd();
  (a.vocab||[]).forEach(v=>{
    planUpsert({id:Date.now()+Math.floor(Math.random()*9999), kind:'词汇', key:v.w, en:v.t, cn:v.w, note:`来自：${src}`, src, next:addDays(date,1), step:0});
  });
  // 若有最佳译文，也可以当句型复习
  if(a.best && (q.t==='hanyi'||q.t==='yihan')){
    planUpsert({id:Date.now()+Math.floor(Math.random()*9999), kind:'句型/译文', key:q.q.slice(0,24), en:a.best, cn:'', note:(a.note||'').slice(0,120), src, next:addDays(date,3), step:0});
  }
}
const PLAN_STEPS=[1,3,7,14,30,60];
function planDone(id){
  const plan=getPlan();
  const i=plan.findIndex(p=>p.id===id);
  if(i<0) return;
  const p=plan[i];
  const step=Math.min((p.step||0)+1, PLAN_STEPS.length-1);
  p.step=step;
  p.next=addDays(ymd(), PLAN_STEPS[step]);
  // 若已到高阶，标记掌握（可清理）
  if(step>=4) p.mastered=true;
  plan[i]=p;
  savePlan(plan);
  render();
}
function planSnooze(id,days){
  const plan=getPlan();
  const i=plan.findIndex(p=>p.id===id);
  if(i<0) return;
  plan[i].next=addDays(ymd(),days);
  savePlan(plan); render();
}
function planRemove(id){
  savePlan(getPlan().filter(p=>p.id!==id));
  render();
}
function planClearDone(){
  savePlan(getPlan().filter(p=>!p.mastered));
  render();
}
function planAuto(){
  // 从错题本抽取关键词（简单策略：把 note 里出现的“正确表达/关键”当提示）
  const errs=getErr();
  errs.slice(0,80).forEach(e=>{
    if(e.cor){
      planUpsert({id:Date.now()+Math.floor(Math.random()*9999), kind:'错题回顾', key:e.w, en:e.cor, cn:'', note:(e.note||'').slice(0,120), src:e.src||'错题本', next:addDays(ymd(),1), step:0});
    }
  });
  alert('已从错题本补充生成计划（取前80条）。');
  render();
}

// ---- Bank session logic
function bankStart(){
  const raw=QB[CLV]||[];
  let qs=raw.map((q,idx)=>({ ...q,_id:q.id||idx, subj:q.subj || ((q.t==='hanyi'||q.t==='yihan')?'实务':'综合能力'), qtype:q.qtype || q.t }));
  qs=qs.filter(q=>q.subj===BSub);
  if(BType!=='all') qs=qs.filter(q=>q.qtype===BType);
  qs=shuffle(qs);
  if(BNum>0) qs=qs.slice(0,Math.min(BNum,qs.length));
  BSession={stage:'doing',subj:BSub,type:BType,list:qs,ans:{},idx:0,startedAt:Date.now()};
  render();
}
function bankPick(i){
  const s=BSession; if(!s||s.stage!=='doing') return;
  const q=s.list[s.idx];
  s.ans[q._id]=i;
  BSession=s;
  render();
}
function bankTypeAnswer(v){
  const s=BSession; if(!s||s.stage!=='doing') return;
  const q=s.list[s.idx];
  s.ans[q._id]=v;
  BSession=s;
}
function bankPrev(){ if(!BSession||BSession.stage!=='doing') return; BSession.idx=Math.max(0,BSession.idx-1); render(); }
function bankNext(){ if(!BSession||BSession.stage!=='doing') return; BSession.idx=Math.min(BSession.list.length-1,BSession.idx+1); render(); }
function bankSubmit(){
  const s=BSession; if(!s||s.stage!=='doing') return;
  const total=s.list.length;
  const keys=Object.keys(s.ans||{});
  if(keys.length<total){ alert('请先完成全部题目再提交。'); return; }

  let correct=0, wrongQs=[];
  s.list.forEach(q=>{
    const ua=s.ans[q._id];
    if(typeof q.a==='number' && typeof ua==='number'){
      if(ua===q.a) correct++;
      else wrongQs.push(q);
    }else{
      // 非选择题暂不自动判分：一律算未判（不计对）
      wrongQs.push(q);
    }
  });
  const acc=Math.round(correct/total*100);

  // 更新累计统计
  const qstat=getQStat();
  qstat.total=(qstat.total||0)+total;
  qstat.correct=(qstat.correct||0)+correct;
  qstat.byType=qstat.byType||{};
  s.list.forEach(q=>{
    const t=q.qtype||q.t||'other';
    qstat.byType[t]=qstat.byType[t]||{t:0,c:0};
    qstat.byType[t].t+=1;
    const ua=s.ans[q._id];
    if(typeof q.a==='number' && typeof ua==='number' && ua===q.a) qstat.byType[t].c+=1;
  });
  setQStat(qstat);

  // 错题入错题本 + 生成计划
  wrongQs.forEach(q=>{
    addQErrAuto(q);
    planFromAnalysis(q);
  });

  // 保存本次session日志（用于后续更丰富的统计）
  const d=getUD(); d.sessions=d.sessions||[];
  d.sessions.unshift({id:Date.now(),dt:ymd(),subj:s.subj,type:s.type,total,correct,acc});
  setUD(d);

  s.stage='result';
  s.result={total,correct,acc,wrong:wrongQs.length};
  BSession=s;
  rNav();
  render();
}
function bankReset(){ BSession=null; render(); }

// ---- Flashcards
function getAllWords(){
  const d=getUD();
  const my=d.myWords||[];
  return [...VOCAB_DB, ...my];
}
function getFKnown(){ return getUD().fknown||{}; }
function setFKnown(k){ const d=getUD(); d.fknown=k; setUD(d); sync('ok'); }
const _FLASH={deck:[],sig:''};
function flashRebuild(){ _FLASH.sig=''; FIdx=0; FReveal=false; }
function flashGetDeck(){
  const all=getAllWords();
  const deck=all.filter(w=>{
    const okTag=(FTag==='all') || (w.tags||[]).includes(FTag);
    const okCat=(FCat==='all') || ((w.cat||'其他')===FCat);
    return okTag && okCat;
  });
  const sig=FTag+'|'+FCat+'|'+deck.length;
  if(_FLASH.sig!==sig){ _FLASH.deck=shuffle(deck.slice()); _FLASH.sig=sig; FIdx=0; FReveal=false; }
  return _FLASH.deck;
}
function flashPrev(){ const d=flashGetDeck(); if(!d.length) return; FIdx=(FIdx-1+d.length)%d.length; FReveal=false; render(); }
function flashNext(){ const d=flashGetDeck(); if(!d.length) return; FIdx=(FIdx+1)%d.length; FReveal=false; render(); }
function flashMark(ok){
  const d=flashGetDeck(); if(!d.length) return;
  const cur=d[FIdx%d.length];
  const known=getFKnown();
  if(ok){
    known[cur.id||cur.en]=1;
    setFKnown(known);
  }else{
    // 不会：加入计划
    planUpsert({id:Date.now()+Math.floor(Math.random()*9999),kind:'背词',key:cur.en,en:cur.en,cn:cur.cn,note:cur.mem||'',src:'闪卡',next:addDays(ymd(),1),step:0});
  }
  flashNext();
}

// ---- IPA & Audio (dictionaryapi.dev)
async function dictLookup(word){
  const d=getUD(); d.dictCache=d.dictCache||{};
  if(d.dictCache[word]) return d.dictCache[word];
  const url=`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error('查词失败');
  const js=await res.json();
  const phonetics=[];
  let aud=null;
  (js||[]).forEach(ent=>{
    (ent.phonetics||[]).forEach(p=>{
      if(p.text) phonetics.push(p.text);
      if(!aud && p.audio) aud=p.audio;
    });
  });
  const out={phonetics:[...new Set(phonetics)].slice(0,3), audio:aud||null};
  d.dictCache[word]=out; setUD(d);
  return out;
}
async function flashLoadIPA(w){
  try{
    const word=decodeURIComponent(w);
    const out=await dictLookup(word);
    const el=document.getElementById('ipa');
    if(el) el.textContent=out.phonetics?.join('  ')||'（无音标数据）';
  }catch(e){ alert('获取音标失败：'+(e?.message||e)); }
}
async function flashSpeak(w){
  try{
    const word=decodeURIComponent(w);
    const out=await dictLookup(word);
    if(out.audio){
      const a=new Audio(out.audio);
      a.play();
    }else{
      alert('未找到可用发音音频（该API可能无该词音频）。');
    }
  }catch(e){ alert('发音失败：'+(e?.message||e)); }
}

function hotDoImport(){

// ---- Cloud (Firebase optional)
function getCloudCfg(){
  try{ return JSON.parse(localStorage.getItem(AK+'_cloudcfg')||'null'); }catch{ return null; }
}
function setCloudCfg(cfg){ localStorage.setItem(AK+'_cloudcfg',JSON.stringify(cfg||null)); }
async function cloudInit(){
  const cfg=getCloudCfg();
  if(!cfg?.cfg) throw new Error('未填写 Firebase Config');
  if(window.__fb) return window.__fb;
  const appMod=await import('https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js');
  const authMod=await import('https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js');
  const fsMod=await import('https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js');
  const app=appMod.initializeApp(JSON.parse(cfg.cfg));
  const auth=authMod.getAuth(app);
  const db=fsMod.getFirestore(app);
  window.__fb={app,auth,db,authMod,fsMod};
  return window.__fb;
}
function cloudSaveCfg(){
  try{
    const cfgStr=document.getElementById('fbCfg')?.value.trim();
    const email=document.getElementById('fbEmail')?.value.trim();
    const pass=document.getElementById('fbPass')?.value;
    if(cfgStr){ JSON.parse(cfgStr); } // validate
    setCloudCfg({cfg:cfgStr||'',email:email||'',pass:pass||''});
    alert('已保存云同步配置（注意：密码会保存在本设备浏览器中）。');
  }catch(e){ alert('保存失败：'+(e?.message||e)); }
}
async function cloudConnect(){
  try{
    const cfg=getCloudCfg();
    if(!cfg?.email||!cfg?.pass) throw new Error('请先填写云账号邮箱与密码');
    const fb=await cloudInit();
    const {signInWithEmailAndPassword,createUserWithEmailAndPassword}=fb.authMod;
    try{
      await signInWithEmailAndPassword(fb.auth,cfg.email,cfg.pass);
    }catch(e){
      // 若不存在则创建
      await createUserWithEmailAndPassword(fb.auth,cfg.email,cfg.pass);
    }
    await cloudPull();
    alert('云端连接成功，并已拉取数据。');
  }catch(e){ alert('连接失败：'+(e?.message||e)); }
}
async function cloudPull(){
  const cfg=getCloudCfg();
  const fb=await cloudInit();
  const {doc,getDoc}=fb.fsMod;
  const u=fb.auth.currentUser;
  if(!u) throw new Error('未登录云账号');
  const ref=doc(fb.db,'catti_pro',u.uid);
  const snap=await getDoc(ref);
  if(snap.exists()){
    const data=snap.data()?.data;
    if(data && typeof data==='object'){
      setUD(data);
      sync('ok');
      render();
    }
  }
}
async function cloudPush(){
  try{
    const fb=await cloudInit();
    const {doc,setDoc,serverTimestamp}=fb.fsMod;
    const u=fb.auth.currentUser;
    if(!u) throw new Error('请先点击“连接并拉取”登录云账号');
    const ref=doc(fb.db,'catti_pro',u.uid);
    await setDoc(ref,{data:getUD(),updatedAt:serverTimestamp?serverTimestamp():new Date().toISOString()},{merge:true});
    alert('已推送到云端。');
  }catch(e){ alert('推送失败：'+(e?.message||e)); }
}
function cloudDisable(){ setCloudCfg(null); alert('已关闭云同步（本地数据不受影响）。'); render(); }
async function cloudSyncNow(){
  const cfg=getCloudCfg();
  if(!cfg?.cfg){
    alert('未启用云同步：你可以在「数据/同步」里配置 Firebase（免费额度），或继续使用导入/导出换设备。');
    return;
  }
  // 尝试连接并推送
  await cloudConnect();
  await cloudPush();
}
